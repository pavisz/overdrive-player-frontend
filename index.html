<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overdrive Player Pro</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0b10; --card: #141622; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .container { width: 100%; max-width: 900px; }
        h1 { color: var(--neon); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        .player-card { background: var(--card); padding: 15px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a2d3e; }
        
        /* The Video Tag */
        video { width: 100%; border-radius: 10px; background: black; cursor: pointer; }

        /* Controls */
        .controls { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        input, select, button { background: #1c1f2e; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--neon); }
        
        button { background: var(--neon); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        button:hover { filter: brightness(1.2); }
        
        .btn-snap { background: #e91e63; color: white; grid-column: span 3; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Overdrive Player</h1>
        
        <div class="player-card">
            <video id="vid" crossorigin="anonymous" controls playsinline>
                <source id="vidsrc" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            </video>

            <div class="controls">
                <input type="text" id="customUrl" placeholder="Paste .mp4 stream link here...">
                <button id="loadBtn">Load</button>
                <select id="speed">
                    <option value="1.0">1.0x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2.0">2.0x</option>
                </select>
                <button class="btn-snap" id="snapBtn">📸 Take Screenshot & Send</button>
            </div>
        </div>
    </div>

    <script>
        const HF_SPACE_URL = "https://pavisz-overdrive-server.hf.space";
        const vid = document.getElementById('vid');
        const vidsrc = document.getElementById('vidsrc');

        // Load Custom Link
        document.getElementById('loadBtn').onclick = () => {
            const url = document.getElementById('customUrl').value;
            if(url) {
                vidsrc.src = url;
                vid.load();
                vid.play();
            }
        };

        // Screenshot Engine
        document.getElementById('snapBtn').onclick = async () => {
            const btn = document.getElementById('snapBtn');
            btn.innerText = "Processing...";
            
            const canvas = document.createElement('canvas');
            canvas.width = vid.videoWidth;
            canvas.height = vid.videoHeight;
            canvas.getContext('2d').drawImage(vid, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('file', blob, 'snap.png');
                fd.append('timestamp', Math.floor(vid.currentTime) + "s");
                
                try {
                    await fetch(`${HF_SPACE_URL}/upload-screenshot`, { method: 'POST', body: fd });
                    alert("Sent!");
                } catch(e) { alert("Error: Check CORS/Server"); }
                btn.innerText = "📸 Take Screenshot & Send";
            });
        };

        // Speed
        document.getElementById('speed').onchange = (e) => vid.playbackRate = e.target.value;
    </script>
</body>
</html>
